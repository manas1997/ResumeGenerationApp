services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resume_app
      POSTGRES_PASSWORD: resume_app
      POSTGRES_DB: resume_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../../services/api
    environment:
      RESUME_APP_ENVIRONMENT: local
      RESUME_APP_CORS_ORIGINS: '["http://localhost:3000"]'
      RESUME_APP_ENABLE_AI_REWRITING: ${RESUME_APP_ENABLE_AI_REWRITING:-true}
      RESUME_APP_OPENAI_API_KEY: ${RESUME_APP_OPENAI_API_KEY:-}
      RESUME_APP_OPENAI_MODEL: ${RESUME_APP_OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
